axon.axonserver.servers=${AXON_AXONSERVER_SERVERS:localhost:8124}
spring.application.name=appointment-service
server.port=8082

eureka.client.serviceUrl.defaultZone=${EUREKA_CLIENT_SERVICEURL_DEFAULTZONE:http://localhost:8761/eureka/}

spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/appointment-service}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:postgres}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:password}
spring.datasource.driver-class-name=${SPRING_DATASOURCE_DRIVER_CLASS_NAME:org.postgresql.Driver}

spring.jpa.hibernate.ddl-auto=none
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect





springdoc.api-docs.path=/v3/api-docs
springdoc.swagger-ui.path=/api-docs

feign.user-service.url=${FEIGN_USER_SERVICE_URL:http://localhost:8085/user-service/users}
feign.notification-service.url=${FEIGN_NOTIFICATION_SERVICE_URL:http://localhost:8086/notification-service}
feign.doctor-service.url=${FEIGN_DOCTOR_SERVICE_URL:http://localhost:8090/doctor-service}

spring.cache.type=redis
spring.data.redis.host=${SPRING_DATA_REDIS_HOST:localhost}
spring.data.redis.port=6379
spring.data.redis.password=
spring.data.redis.timeout=60000

feign.client.config.default.connectTimeout=5000
feign.client.config.default.readTimeout=5000



spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.minimum-idle=2
spring.datasource.hikari.idle-timeout=30000
spring.datasource.hikari.max-lifetime=1800000
spring.datasource.hikari.connection-timeout=30000