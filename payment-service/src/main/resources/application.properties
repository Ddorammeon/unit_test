# Frontend URLs (D�ng ?? payOS redirect sau khi thanh to�n)
payos.return-url=http://localhost:3000/payment/result
payos.cancel-url=http://localhost:3000/payment/result

# Feign Client Configuration
feign.client.config.default.loggerLevel=full

# Swagger/OpenAPI Configuration
springdoc.api-docs.path=/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.operationsSorter=method
springdoc.swagger-ui.tagsSorter=alpha
springdoc.swagger-ui.tryItOutEnabled=true

axon.axonserver.servers=${AXON_AXONSERVER_SERVERS:localhost:8124}


db-scheduler.enabled=true
db-scheduler.table-name=scheduled_tasks
#db-scheduler.threads=10
#db-scheduler.heartbeat-interval=5m
#db-scheduler.missed-heartbeats-limit=6
#db-scheduler.polling-interval=10s
#db-scheduler.shutdown-max-wait=30m

logging.level.org.axonframework.eventhandling=DEBUG

spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.minimum-idle=2
spring.datasource.hikari.idle-timeout=30000
spring.datasource.hikari.max-lifetime=1800000
spring.datasource.hikari.connection-timeout=30000
