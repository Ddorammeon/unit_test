spring.application.name=payment-service
server.port=8086

eureka.client.service-url.defaultZone=${EUREKA_CLIENT_SERVICEURL_DEFAULTZONE:http://localhost:8761/eureka/}

# Invoice Service Configuration
invoice.service.url=${INVOICE_SERVICE_URL:http://localhost:8091}
inventory.service.url=${INVENTORY_SERVICE_URL:http://localhost:8084}
patient.service.url=${PATIENT_SERVICE_URL:http://localhost:8089}

spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/payment-service}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:postgres}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:password}

spring.jpa.hibernate.ddl-auto=none
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.show-sql=false







# PayOS Configuration
# (Thay th? b?ng key th?t c?a b?n t? dashboard.payos.vn)
payos.client-id=69603884-a518-484e-9990-912b1a0dc267
payos.api-key=b0e2929e-270f-42e3-ae1a-0f248754a9a0
